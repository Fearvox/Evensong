<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="robots" content="noindex, nofollow, noarchive" />
<meta name="referrer" content="no-referrer" />
<meta http-equiv="refresh" content="0; url=https://evensong.zonicdesign.art/handoff/dashboard" />
<title>Evensong dashboard moved</title>
<link rel="canonical" href="https://evensong.zonicdesign.art/handoff/dashboard" />
<style>
  :root {
    --paper-base: oklch(0.96 0.01 85);
    --ink-primary: oklch(0.22 0.02 60);
    --ink-secondary: oklch(0.45 0.02 65);
    --palm-shadow: oklch(0.35 0.08 160);
  }
  body {
    min-height: 100vh;
    margin: 0;
    display: grid;
    place-items: center;
    background: var(--paper-base);
    color: var(--ink-primary);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  main {
    width: min(520px, calc(100% - 40px));
    line-height: 1.55;
  }
  a {
    color: var(--palm-shadow);
    font-weight: 650;
  }
  p {
    color: var(--ink-secondary);
  }
</style>
<script>
  location.replace("https://evensong.zonicdesign.art/handoff/dashboard");
</script>
</head>
<body>
  <main>
    <h1>Evensong dashboard moved.</h1>
    <p>The canonical handoff dashboard now lives under the Evensong domain.</p>
    <p><a href="https://evensong.zonicdesign.art/handoff/dashboard">Open the new dashboard</a></p>
  </main>
</body>
</html>
