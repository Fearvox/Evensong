version: "3.9"

x-common-env: &common-env
  NODE_ENV: benchmark
  LOG_LEVEL: info
  RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
  REDIS_URL: redis://redis:6379
  DATABASE_URL: postgresql://benchmark:benchmark@postgres:5432/evensong
  MINIO_ENDPOINT: minio
  MINIO_PORT: "9000"
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin

services:
  # ── Infrastructure ────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: benchmark
      POSTGRES_PASSWORD: benchmark
      POSTGRES_DB: evensong
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U benchmark -d evensong"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Application Services ──────────────────────────────────────────────────
  experiment-tracker:
    build:
      context: ./services/experiment-tracker
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      <<: *common-env
      PORT: "3001"
      SERVICE_NAME: experiment-tracker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  model-registry:
    build:
      context: ./services/model-registry
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      <<: *common-env
      PORT: "3002"
      SERVICE_NAME: model-registry
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  training-pipeline:
    build:
      context: ./services/training-pipeline
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    environment:
      <<: *common-env
      PORT: "3003"
      SERVICE_NAME: training-pipeline
      EXPERIMENT_TRACKER_URL: http://experiment-tracker:3001
      MODEL_REGISTRY_URL: http://model-registry:3002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      experiment-tracker:
        condition: service_healthy
      model-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 25s

  dataset-vault:
    build:
      context: ./services/dataset-vault
      dockerfile: Dockerfile
    ports:
      - "3004:3004"
    environment:
      <<: *common-env
      PORT: "3004"
      SERVICE_NAME: dataset-vault
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  paper-engine:
    build:
      context: ./services/paper-engine
      dockerfile: Dockerfile
    ports:
      - "3005:3005"
    environment:
      <<: *common-env
      PORT: "3005"
      SERVICE_NAME: paper-engine
      EXPERIMENT_TRACKER_URL: http://experiment-tracker:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      experiment-tracker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  compute-scheduler:
    build:
      context: ./services/compute-scheduler
      dockerfile: Dockerfile
    ports:
      - "3006:3006"
    environment:
      <<: *common-env
      PORT: "3006"
      SERVICE_NAME: compute-scheduler
      TRAINING_PIPELINE_URL: http://training-pipeline:3003
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3006/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  review-system:
    build:
      context: ./services/review-system
      dockerfile: Dockerfile
    ports:
      - "3007:3007"
    environment:
      <<: *common-env
      PORT: "3007"
      SERVICE_NAME: review-system
      PAPER_ENGINE_URL: http://paper-engine:3005
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      paper-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3007/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  collab-hub:
    build:
      context: ./services/collab-hub
      dockerfile: Dockerfile
    ports:
      - "3008:3008"
    environment:
      <<: *common-env
      PORT: "3008"
      SERVICE_NAME: collab-hub
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3008/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  insight-engine:
    build:
      context: ./services/insight-engine
      dockerfile: Dockerfile
    ports:
      - "3009:3009"
    environment:
      <<: *common-env
      PORT: "3009"
      SERVICE_NAME: insight-engine
      EXPERIMENT_TRACKER_URL: http://experiment-tracker:3001
      MODEL_REGISTRY_URL: http://model-registry:3002
      COMPUTE_SCHEDULER_URL: http://compute-scheduler:3006
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      experiment-tracker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3009/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  auth-gateway:
    build:
      context: ./services/auth-gateway
      dockerfile: Dockerfile
    ports:
      - "3010:3010"
    environment:
      <<: *common-env
      PORT: "3010"
      SERVICE_NAME: auth-gateway
      JWT_SECRET: benchmark-secret-not-for-production
      TOKEN_TTL_SECONDS: "3600"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3010/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:

networks:
  default:
    name: evensong_net
    driver: bridge
