name: 🐛 Bug report
description: Something in CCR, retrieval, or the benchmark harness is broken or behaves unexpectedly.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please include enough info for
        us to reproduce locally. Questions ("how do I…") belong in
        [Discussions Q&A](https://github.com/Fearvox/Evensong/discussions/new?category=q-a) instead.

  - type: input
    id: version
    attributes:
      label: Commit SHA or version
      description: Output of `git rev-parse --short HEAD` in your local checkout.
      placeholder: "e.g. 1ed69de"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Which part of the repo?
      options:
        - CCR CLI / REPL (src/entrypoints/**, src/screens/**)
        - Retrieval pipeline (src/services/retrieval/**)
        - API / provider clients (src/services/api/**)
        - Benchmark harness (scripts/benchmark-*.ts)
        - Manifest builder / vault ingestion
        - MCP packages (packages/**)
        - Tests / regression suite
        - Build / Bun runtime
        - Documentation
        - Other (please specify in "What happened")
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: Describe the behavior you observed.
      placeholder: "Running `bun run scripts/vault-recall.ts` against a 500-entry manifest OOMs after 30s…"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
      placeholder: "Should complete under 5 seconds given Hybrid stage1TopK=50."
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: |
        Exact commands / code / vault state required to trigger the bug. If
        this involves a large vault, note the size and whether the failure
        reproduces on the default 18-entry vault.
      render: shell
      placeholder: |
        bun install
        bun run scripts/vault-recall.ts "test query" --vault=/path/to/my/vault
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Bun version, any non-default env vars.
      placeholder: |
        - OS: macOS 24.6.0 (Darwin arm64)
        - Bun: 1.3.11
        - XAI_API_KEY set: yes
        - Atomic Chat running on :1337: yes
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / stack trace
      description: Paste the full error. Remove any secret keys first.
      render: text

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-filing checklist
      options:
        - label: I searched [existing issues](https://github.com/Fearvox/Evensong/issues?q=is%3Aissue) and didn't find a duplicate.
          required: true
        - label: I've removed any API keys / secrets from the logs.
          required: true
        - label: I'm running a committed version (no uncommitted local mods that could be the cause).
          required: false
